```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISMAIL SMART HUB</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins, sans-serif;
}

body{
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
color:white;
text-align:center;
}

/* Header */
header{
padding:25px;
background: rgba(255,255,255,0.05);
backdrop-filter: blur(10px);
border-bottom:1px solid rgba(255,255,255,0.1);
}

header h1{
font-size:28px;
letter-spacing:2px;
background: linear-gradient(90deg,#00f2fe,#4facfe);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

#status{
margin-top:8px;
font-size:13px;
color:#00ff88;
}

/* Login Panel */
.login{
margin-top:40px;
}

.login input{
padding:12px;
margin:10px;
border-radius:10px;
border:none;
outline:none;
width:220px;
}

.login button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#00f2fe;
font-weight:bold;
cursor:pointer;
}

/* Grid */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:20px;
padding:25px;
max-width:500px;
margin:auto;
display:none;
}

/* Card */
.card{
background: rgba(255,255,255,0.08);
border-radius:20px;
padding:20px;
backdrop-filter: blur(12px);
transition:0.3s;
border:1px solid rgba(255,255,255,0.1);
cursor:pointer;
}

.card:hover{
transform: translateY(-5px) scale(1.03);
box-shadow:0 0 20px rgba(0,255,255,0.3);
}

.card.active{
background: linear-gradient(135deg,#00f2fe,#4facfe);
color:black;
font-weight:bold;
box-shadow:0 0 25px #00f2fe;
}

.icon{
font-size:28px;
margin-bottom:8px;
}

/* Toggle switch */
.switch{
margin-top:10px;
width:45px;
height:22px;
background:#555;
border-radius:20px;
margin-left:auto;
margin-right:auto;
position:relative;
transition:0.3s;
}

.switch::after{
content:"";
width:18px;
height:18px;
background:white;
border-radius:50%;
position:absolute;
top:2px;
left:3px;
transition:0.3s;
}

.card.active .switch{
background:#00ffcc;
}

.card.active .switch::after{
left:24px;
}

.logout{
margin-top:10px;
display:none;
}

.logout button{
padding:8px 15px;
border:none;
border-radius:8px;
background:red;
color:white;
cursor:pointer;
}

footer{
margin-top:20px;
font-size:12px;
opacity:0.7;
}

</style>
</head>

<body>

<header>
<h1>ISMAIL SMART HUB</h1>
<div id="status">SECURE LOGIN REQUIRED</div>
</header>

<!-- LOGIN -->
<div class="login" id="loginBox">

<input type="email" id="email" placeholder="Email">
<br>
<input type="password" id="password" placeholder="Password">
<br>
<button onclick="login()">LOGIN</button>

</div>

<!-- LOGOUT -->
<div class="logout" id="logoutBox">
<button onclick="logout()">LOGOUT</button>
</div>

<div class="grid" id="grid"></div>

<footer>
Secure Cloud Automation • Premium UI
</footer>

<script>

// Firebase config
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_PROJECT.firebaseapp.com",
databaseURL: "YOUR_DATABASE_URL",
projectId: "YOUR_PROJECT"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database().ref("switchState");

// Devices
const devices = [
{name:"Master Light", icon:"💡"},
{name:"Ceiling Fan", icon:"🌀"},
{name:"Table Lamp", icon:"🔆"},
{name:"Main Bulb", icon:"🏠"},
{name:"AC Unit", icon:"❄️"},
{name:"Smart TV", icon:"📺"},
{name:"CCTV Cam", icon:"📷"},
{name:"Main Gate", icon:"🚪"}
];

let state = 0;

const grid = document.getElementById("grid");

// Create cards
devices.forEach((device,i)=>{

grid.innerHTML += `
<div class="card" id="d${i}" onclick="toggle(${i})">
<div class="icon">${device.icon}</div>
<div>${device.name}</div>
<div class="switch"></div>
</div>
`;

});

// LOGIN
function login(){

const email=document.getElementById("email").value;
const pass=document.getElementById("password").value;

auth.signInWithEmailAndPassword(email,pass)
.catch(e=>alert(e.message));

}

// LOGOUT
function logout(){
auth.signOut();
}

// AUTH STATE
auth.onAuthStateChanged(user=>{

if(user){

document.getElementById("status").innerHTML="● SECURE SYSTEM ONLINE";

document.getElementById("loginBox").style.display="none";
document.getElementById("logoutBox").style.display="block";
document.getElementById("grid").style.display="grid";

}
else{

document.getElementById("status").innerHTML="SECURE LOGIN REQUIRED";

document.getElementById("loginBox").style.display="block";
document.getElementById("logoutBox").style.display="none";
document.getElementById("grid").style.display="none";

}

});

// Toggle
function toggle(bit){

state ^= (1<<bit);

db.set(state);

}

// Listen firebase
db.on("value", snap=>{

state = snap.val() || 0;

for(let i=0;i<devices.length;i++){

let card=document.getElementById("d"+i);

if(state & (1<<i))
card.classList.add("active");
else
card.classList.remove("active");

}

});

</script>

</body>
</html>
