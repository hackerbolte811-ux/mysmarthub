<style>
*{

}

body{

header{

}

.grid{

.card{

.card.active{

}

.switch::after{
content:"";

<body>

<header>
<h1>ISMAIL SMART HUB</h1>
<div id="status">SECURE LOGIN REQUIRED</div>
</header>

<div class="login" id="loginBox">
<input type="email" id="email" placeholder="Email">
<br>
<input type="password" id="password" placeholder="Password">
<br>
<button onclick="login()">LOGIN</button>
</div>

<div class="logout" id="logoutBox">
<button onclick="logout()">LOGOUT</button>
</div>

<div class="grid" id="grid"></div>

<script>

// YOUR FIREBASE CONFIG (ADDED)
const firebaseConfig = {
apiKey: "AIzaSyD2rkLfvZ1WSxZLh9N9bK0DRuunpln852k",
authDomain: "home-automation-5f3a3.firebaseapp.com",
databaseURL: "https://home-automation-5f3a3-default-rtdb.firebaseio.com",
projectId: "home-automation-5f3a3"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database().ref("switchState");

const devices = [
{name:"Master Light", icon:"💡"},
{name:"Ceiling Fan", icon:"🌀"},
{name:"Table Lamp", icon:"🔆"},
{name:"Main Bulb", icon:"🏠"},
{name:"AC Unit", icon:"❄️"},
{name:"Smart TV", icon:"📺"},
{name:"CCTV Cam", icon:"📷"},
{name:"Main Gate", icon:"🚪"}
];

let state=0;

const grid=document.getElementById("grid");

devices.forEach((device,i)=>{
grid.innerHTML+=`
<div class="card" id="d${i}" onclick="toggle(${i})">
<div class="icon">${device.icon}</div>
<div>${device.name}</div>
<div class="switch"></div>
</div>
`;
});

function login(){
auth.signInWithEmailAndPassword(
document.getElementById("email").value,
document.getElementById("password").value
).catch(e=>alert(e.message));
}

function logout(){
auth.signOut();
}

auth.onAuthStateChanged(user=>{

if(user){
document.getElementById("status").innerHTML="● SECURE SYSTEM ONLINE";
document.getElementById("loginBox").style.display="none";
document.getElementById("logoutBox").style.display="block";
document.getElementById("grid").style.display="grid";
}
else{
document.getElementById("status").innerHTML="SECURE LOGIN REQUIRED";
document.getElementById("loginBox").style.display="block";
document.getElementById("logoutBox").style.display="none";
document.getElementById("grid").style.display="none";
}

});

function toggle(bit){
state^=(1<<bit);
db.set(state);
}

db.on("value",snap=>{
state=snap.val()||0;
for(let i=0;i<devices.length;i++){
let card=document.getElementById("d"+i);
if(state&(1<<i))
card.classList.add("active");
else
card.classList.remove("active");
}
});

</script>

</body>
</html>
